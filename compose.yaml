name: x3ui-node

services:
  x3ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    restart: unless-stopped
    tty: true
    env_file:
      - .env
    environment:
      XRAY_VMESS_AEAD_FORCED: "${XRAY_VMESS_AEAD_FORCED:-false}"
      XUI_ENABLE_FAIL2BAN: "${XUI_ENABLE_FAIL2BAN:-true}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - x3ui-db:/etc/x-ui/
      - x3ui-cert:/root/cert/
    ports:
      - "${X3UI_PANEL_PORT:-2053}:2053/tcp"
      - "${X3UI_VLESS_PORT:-8443}:8443/tcp"
      - "${X3UI_REALITY_PORT:-443}:443/tcp"

volumes:
  x3ui-db:
  x3ui-cert:
